# Source on `main`; static site on `gh-pages` for Pages "Deploy from a branch".
name: Deploy to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Vite base must match project URL https://USER.github.io/REPO/ or assets 404 → blank page.
      # Override: repo Variable PAGES_BASE = / when using only a custom domain at the domain root.
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES_BASE: ${{ vars.PAGES_BASE || format('/{0}/', github.event.repository.name) }}

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
