# Source on `main`; static site on `gh-pages` for Pages "Deploy from a branch".
name: Deploy to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Vite base must match the deployed URL:
      # - custom domain (public/CNAME present): /
      # - project pages fallback: /REPO/
      # Repo variable PAGES_BASE, when set, always takes priority.
      - name: Compute base path
        id: base
        run: |
          if [ -n "${{ vars.PAGES_BASE }}" ]; then
            echo "value=${{ vars.PAGES_BASE }}" >> "$GITHUB_OUTPUT"
          elif [ -f public/CNAME ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES_BASE: ${{ steps.base.outputs.value }}

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
